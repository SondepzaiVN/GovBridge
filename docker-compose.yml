services:
    backend:
        build:
            context: ./backend
        container_name: backend-govbridge
        ports:
            - '3000:3000'
        restart: unless-stopped
        environment:
            - NODE_ENV=production
        volumes:
            - /app/node_modules

    frontend:
        build:
            context: ./frontend
        container_name: frontend-govbridge
        ports:
            - '5173:5173'
        restart: unless-stopped
        environment:
            - NODE_ENV=development
            - VITE_PROXY_TARGET=http://backend:3000
        volumes:
            - /app/node_modules
